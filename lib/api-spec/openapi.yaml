  # ── SEARCH ────────────────────────────────────────────────────────────────
  /search:
    get:
      operationId: siteSearch
      tags: [search]
      summary: Site-wide search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ── USERS ─────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin only)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── AUTH ───────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, username, name, role]
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, teacher, staff]

    # ── DASHBOARD ─────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalStudents, totalPersonnel, totalNews, totalAnnouncements, recentNews, recentAnnouncements, upcomingEvents, studentsByGrade]
      properties:
        totalStudents:
          type: integer
        totalPersonnel:
          type: integer
        totalNews:
          type: integer
        totalAnnouncements:
          type: integer
        recentNews:
          type: array
          items:
            $ref: "#/components/schemas/NewsSummary"
        recentAnnouncements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        upcomingEvents:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        studentsByGrade:
          type: array
          items:
            $ref: "#/components/schemas/GradeCount"

    GradeCount:
      type: object
      required: [grade, count]
      properties:
        grade:
          type: integer
        count:
          type: integer

    NewsSummary:
      type: object
      required: [id, title, category, publishedAt, coverImage]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        publishedAt:
          type: string
        coverImage:
          type: ["string", "null"]

    # ── STUDENTS ──────────────────────────────────────────────────────────
    Student:
      type: object
      required: [id, studentId, firstName, lastName, grade, section, status, createdAt]
      properties:
        id:
          type: integer
        studentId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        grade:
          type: integer
        section:
          type: string
        status:
          type: string
        createdAt:
          type: string

    StudentInput:
      type: object
      required: [studentId, firstName, lastName, grade, section]
      properties:
        studentId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        grade:
          type: integer
          minimum: 7
          maximum: 12
        section:
          type: string
        status:
          type: string
          default: "Officially Enrolled"

    StudentUpdate:
