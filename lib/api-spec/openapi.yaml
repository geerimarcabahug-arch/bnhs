  /pta:
    get:
      operationId: getPTA
      tags: [pta]
      summary: Get PTA info
      responses:
        "200":
          description: PTA info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PTA"
    put:
      operationId: updatePTA
      tags: [pta]
      summary: Update PTA info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PTAInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
